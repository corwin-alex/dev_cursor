services:
  - type: web
    name: learning-progress-tracker
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /var/data/learning-tracker.db
    disks:
      - name: tracker-data
        mountPath: /var/data
        sizeGB: 1
